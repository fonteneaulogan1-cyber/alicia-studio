<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALICIA • MILLION EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Playfair+Display:italic,wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff75c3; --glass: rgba(255, 255, 255, 0.04); --red: #ff0040; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s ease; }
        body.obsession { background: radial-gradient(circle, #400010 0%, #000 100%); }

        .main { flex: 1; padding: 25px; overflow-y: auto; padding-bottom: 120px; }
        .section { display: none; animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        header h1 { font-family: 'Playfair Display', serif; font-size: 50px; font-style: italic; line-height: 0.9; background: linear-gradient(180deg, #fff 30%, #666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .status-line { color: var(--p); font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 35px; margin-bottom: 20px; backdrop-filter: blur(40px); }
        .label { font-size: 9px; font-weight: 800; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .big-val { font-size: 80px; font-weight: 200; letter-spacing: -4px; line-height: 1; color: var(--p); }

        .gym-grid { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .stat-item span { display: block; font-size: 18px; font-weight: 800; }
        .stat-item small { font-size: 8px; opacity: 0.3; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { aspect-ratio: 1; background: rgba(255,255,255,0.02); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .day.starred::after { content: '⭐'; font-size: 7px; position: absolute; bottom: 2px; }
        .day.period { background: rgba(255, 117, 195, 0.25); border-color: var(--p); }

        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .memory-img { width: 100%; height: 150px; border-radius: 15px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .glitch { animation: shake 0.2s linear 3; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

        .nav { position: fixed; bottom: 30px; left: 5%; width: 90%; height: 85px; background: rgba(10, 10, 10, 0.85); border-radius: 45px; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.08); }
        .nav-item { font-size: 26px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="main">
        <header>
            <h1 id="main-title" onclick="triggerObsession()">Alicia.</h1>
            <p class="status-line" id="status-text">Possession: Active.</p>
        </header>

        <div id="home" class="section active">
            <div class="card">
                <span class="label">Shared Eternity</span>
                <div style="display: flex; align-items: baseline;">
                    <span class="big-val" id="days">0</span>
                    <span style="font-size: 14px; opacity: 0.2; font-weight: 800; margin-left: 10px;">JOURS</span>
                </div>
            </div>
            <div class="card" onmousedown="startLongPress()" onmouseup="endLongPress()" ontouchstart="startLongPress()" ontouchend="endLongPress()">
                <span class="label">Daily Oracle</span>
                <p id="daily-oracle" style="font-family: 'Playfair Display'; font-style: italic; font-size: 22px; line-height: 1.4;">"Chargement..."</p>
            </div>
        </div>

        <div id="gym" class="section">
            <div class="card">
                <span class="label">Performance Tracker</span>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="big-val" id="steps">0</span>
                    <span style="font-size: 40px; cursor: pointer;" onclick="cheatSteps()">🦾</span>
                </div>
                <div class="gym-grid">
                    <div class="stat-item"><span id="km">0.00</span><small>KM</small></div>
                    <div class="stat-item"><span id="kcal">0</span><small>KCAL</small></div>
                </div>
                <button onclick="initGym()" id="gym-btn" style="width:100%; background:none; border:1px solid var(--p); color:var(--p); padding:15px; border-radius:20px; margin-top:20px; font-weight:800; font-size:10px;">ACTIVER LES CAPTEURS</button>
            </div>
        </div>

        <div id="cycle" class="section">
            <div class="card">
                <span class="label">Journal d'Intimité</span>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button id="mode-star" onclick="setMode('star')" style="flex:1; padding:12px; border-radius:15px; background:none; border:1px solid var(--p); color:#fff; font-size:10px;">⭐ SEX</button>
                    <button id="mode-period" onclick="setMode('period')" style="flex:1; padding:12px; border-radius:15px; background:none; border:1px solid rgba(255,255,255,0.1); color:#fff; font-size:10px;">🩸 CYCLE</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
        </div>

        <div id="vault" class="section">
            <div id="lock" class="card" style="text-align: center;">
                <span class="label">Private Vault</span>
                <input type="password" id="pass" placeholder="CODE 18/10" style="background:none; border:1px solid var(--p); color:#fff; padding:15px; border-radius:15px; width:100%; text-align:center; font-size:20px; margin:20px 0; outline:none;">
                <button onclick="unlock()" style="background:var(--p); border:none; padding:15px; border-radius:15px; width:100%; font-weight:800;">DÉVERROUILLER</button>
            </div>
            <div id="vault-content" style="display:none;">
                <div class="card">
                    <span class="label">Galerie</span>
                    <div id="gallery-grid"></div>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="addMemory(event)">
                    <button onclick="document.getElementById('file-input').click()" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--p); background:none; color:var(--p); font-weight:800; margin-top:20px;">+ AJOUTER UNE PHOTO</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="go('home', this)">🏠</div>
        <div class="nav-item" onclick="go('gym', this)">🦾</div>
        <div class="nav-item" onclick="go('cycle', this)">📖</div>
        <div class="nav-item" onclick="go('vault', this)">🔒</div>
    </nav>

    <script>
        let currentMode = 'star';
        let stepCount = parseInt(localStorage.getItem('alicia_total_steps') || "0");
        let lastStepTime = 0;
        let titleClicks = 0;
        let pressTimer;

        const phrases = ["Il brûlerait le monde pour son sourire.", "Dans son enfer, elle est sa seule prière.", "Son chaos est son équilibre.", "Possédée par son amour.", "Elle est sa plus belle addiction."];

        window.onload = () => {
            const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            document.getElementById('daily-oracle').innerText = `"${phrases[day % phrases.length]}"`;
            updateGymDisplay();
            (JSON.parse(localStorage.getItem('alicia_memories') || "[]")).forEach(src => displayImg(src));
            renderCalendar();
        };

        function go(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- TRACKER RÉALISTE AVEC FILTRE ---
        function initGym() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => { if(state === 'granted') startGym(); });
            } else { startGym(); }
        }

        function startGym() {
            document.getElementById('gym-btn').innerText = "TRACKING LIVE ✅";
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                let total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                let now = Date.now();

                // Filtre : Intensité > 18 et min 350ms entre deux pas
                if (total > 18 && (now - lastStepTime > 350)) { 
                    stepCount++; 
                    lastStepTime = now;
                    updateGymDisplay(); 
                }
            });
        }

        function updateGymDisplay() {
            document.getElementById('steps').innerText = stepCount;
            document.getElementById('km').innerText = (stepCount * 0.0007).toFixed(2);
            document.getElementById('kcal').innerText = Math.floor(stepCount * 0.04);
            localStorage.setItem('alicia_total_steps', stepCount);
        }

        // --- EASTER EGGS ---
        function triggerObsession() {
            titleClicks++;
            if(titleClicks >= 3) {
                document.body.classList.toggle('obsession');
                document.getElementById('status-text').innerText = document.body.classList.contains('obsession') ? "ACCÈS PRIVÉ. NE PAS TOUCHER." : "Possession: Active.";
                titleClicks = 0;
            }
        }
        function startLongPress() { pressTimer = setTimeout(() => { document.getElementById('daily-oracle').innerText = "\"Tu m'appartiens pour l'éternité.\""; }, 2000); }
        function endLongPress() { clearTimeout(pressTimer); }
        function cheatSteps() { stepCount += 1000; updateGymDisplay(); }

        // --- CALENDRIER & VAULT ---
        function setMode(m) {
            currentMode = m;
            document.getElementById('mode-star').style.borderColor = (m==='star') ? 'var(--p)' : 'rgba(255,255,255,0.1)';
            document.getElementById('mode-period').style.borderColor = (m==='period') ? 'var(--p)' : 'rgba(255,255,255,0.1)';
        }
        function renderCalendar() {
            const cal = document.getElementById('calendar');
            for(let i=1; i<=31; i++) {
                let d = document.createElement('div'); d.className = 'day'; d.innerText = i;
                d.onclick = () => { if(currentMode === 'star') d.classList.toggle('starred'); else d.classList.toggle('period'); };
                cal.appendChild(d);
            }
        }
        function unlock() {
            if(document.getElementById('pass').value === '18/10') {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('vault-content').style.display = 'block';
            } else {
                document.getElementById('lock').classList.add('glitch');
                setTimeout(() => document.getElementById('lock').classList.remove('glitch'), 600);
            }
        }
        function addMemory(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                displayImg(e.target.result);
                let m = JSON.parse(localStorage.getItem('alicia_memories') || "[]");
                m.push(e.target.result); localStorage.setItem('alicia_memories', JSON.stringify(m));
            };
            reader.readAsDataURL(event.target.files[0]);
        }
        function displayImg(src) {
            const img = document.createElement('img'); img.src = src; img.className = 'memory-img';
            document.getElementById('gallery-grid').appendChild(img);
        }

        setInterval(() => { 
            document.getElementById('days').innerText = Math.floor((new Date() - new Date(2025, 9, 18)) / 86400000); 
        }, 1000);
    </script>
</body>
</html>
