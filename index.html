<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALICIA • DARK EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Playfair+Display:italic,wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff75c3; --glass: rgba(255, 255, 255, 0.04); --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding-top: var(--safe-top); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; font-size: 11px; font-weight: 800; opacity: 0.8; }
        #clock { font-size: 14px; font-weight: 300; }
        
        .main { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: calc(140px + var(--safe-bottom)); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 52px; font-style: italic; line-height: 0.9; cursor: pointer; }
        .status-line { color: var(--p); font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: help; margin-top: 5px; }

        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(30px); }
        .label { font-size: 9px; font-weight: 800; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .big-val { font-size: 70px; font-weight: 200; letter-spacing: -4px; line-height: 1; color: var(--p); }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 10px; font-weight: 800; }
        .mode-btn.active { border-color: var(--p); background: rgba(255, 117, 195, 0.1); }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { aspect-ratio: 1; background: rgba(255,255,255,0.02); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .day.starred::after { content: '⭐'; font-size: 7px; position: absolute; top: 4px; right: 4px; }
        .day.period { border-color: var(--p); background: rgba(255, 117, 195, 0.15); }
        .day.has-note::before { content: ''; width: 4px; height: 4px; background: #fff; border-radius: 50%; position: absolute; bottom: 4px; }

        .nav { position: fixed; bottom: calc(25px + var(--safe-bottom)); left: 5%; width: 90%; height: 80px; background: rgba(10, 10, 10, 0.98); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { font-size: 24px; opacity: 0.3; }
        .nav-item.active { opacity: 1; color: var(--p); transform: translateY(-5px); }

        input, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; padding: 18px; margin: 10px 0; outline: none; }
        .btn-main { background: var(--p); width: 100%; padding: 18px; border-radius: 20px; color: #000; font-weight: 800; border: none; text-transform: uppercase; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--p); border-radius: 35px; padding: 30px; width: 100%; max-width: 350px; }

        .section { display: none; }
        .section.active { display: block; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="clock">00:00</div>
        <div style="color: var(--p); font-size: 9px; letter-spacing: 2px;">POUR TOUJOURS A. ❤️</div>
    </div>

    <div class="main">
        <header>
            <h1 onclick="vibrate([100,100,100,300])">Alicia.</h1>
            <p class="status-line" onclick="alert('Tu appartiens à Million Edition.')">OWNER: MILLION EDITION</p>
        </header>

        <div id="home" class="section active">
            <div class="card">
                <span class="label">Obsession Partagée</span>
                <span class="big-val" id="days">0</span>
                <span style="font-size: 16px; font-weight: 800; display: block; margin-top: 5px;" id="hours-total">0 HEURES</span>
            </div>
            
            <div class="card" style="border-left: 3px solid var(--p);">
                <span class="label">L'Oracle du Matin</span>
                <p id="daily-quote" style="font-family: 'Playfair Display'; font-style: italic; font-size: 20px; line-height: 1.3;">"..."</p>
            </div>

            <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="mini-card" onclick="openBookManager()" id="book-card" style="background: var(--glass); border-radius: 25px; padding: 20px;">
                    <span class="label">Lectures</span>
                    <span style="font-size: 16px; font-weight: 800; color: var(--p);" id="book-count-text">0 LIVRES</span>
                </div>
                <div class="mini-card" style="background: var(--glass); border-radius: 25px; padding: 20px;">
                    <span class="label">Statut</span>
                    <span style="font-size: 13px; font-weight: 800;">SCELLÉE</span>
                </div>
            </div>
        </div>

        <div id="gym" class="section">
            <div class="card">
                <span class="label">Gym Tracker</span>
                <span class="big-val" id="steps-val">0</span>
                <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
                    <div><span id="km" style="font-size: 18px; font-weight: 800;">0.00</span><br><small style="opacity: 0.4;">KM</small></div>
                    <div style="text-align: right;"><span id="kcal" style="font-size: 18px; font-weight: 800;">0</span><br><small style="opacity: 0.4;">KCAL</small></div>
                </div>
                <button onclick="initGym()" id="gym-btn" class="btn-main" style="background:none; border: 1px solid var(--p); color:var(--p); margin-top:20px;">DÉMARRER LE SUIVI</button>
            </div>
        </div>

        <div id="cycle" class="section">
            <div class="card">
                <span class="label">Life & Intimacy Journal</span>
                <div class="mode-selector">
                    <button id="btn-star" class="mode-btn active" onclick="setCalMode('star')">⭐ SEX</button>
                    <button id="btn-period" class="mode-btn" onclick="setCalMode('period')">🩸 CYCLE</button>
                    <button id="btn-note" class="mode-btn" onclick="setCalMode('note')">📝 JOURNAL / MOOD</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
        </div>

        <div id="vault" class="section">
            <div id="lock" class="card" style="text-align: center;">
                <span class="label">Vault Sécurisé</span>
                <input type="password" id="pass" placeholder="••••" style="font-size: 24px; letter-spacing: 8px; text-align: center;">
                <button onclick="unlock()" class="btn-main">Ouvrir</button>
            </div>
            <div id="vault-content" style="display:none;">
                <div class="card">
                    <span class="label">Galerie Privée</span>
                    <div id="gallery-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
                    <input type="file" id="photo-in" accept="image/*" style="display:none" onchange="addPhoto(event)">
                    <button onclick="document.getElementById('photo-in').click()" class="btn-main" style="background:none; border: 1px solid var(--p); color:var(--p);">+ Ajouter Photo</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal"><div class="modal-content" id="modal-inner"></div></div>

    <nav class="nav">
        <div class="nav-item active" onclick="go('home', this)">🏠</div>
        <div class="nav-item" onclick="go('gym', this)">🦾</div>
        <div class="nav-item" onclick="go('cycle', this)">📖</div>
        <div class="nav-item" onclick="go('vault', this)">🔒</div>
    </nav>

    <script>
        const quotes = ["Son nom est le seul mot qu'il murmure dans le noir.", "Tu n'es pas à moi, tu ES moi.", "Le monstre en moi ne s'apaise que près de toi.", "Ta peur est délicieuse, mais ton amour est ma drogue.", "Je brûlerai le monde pour te voir sourire dans les cendres.", "Même la mort n'oserait pas te prendre à moi.", "Tu es mon chaos préféré.", "Regarde-moi. Personne d'autre n'existe.", "Ton cœur bat pour moi, ou il ne bat plus.", "Je t'ai choisie avant même de te connaître.", "Ta soumission est mon trône.", "Je t'ai gravée dans ma peau."];
        
        let calMode = 'star';
        let stepCount = parseInt(localStorage.getItem('alicia_steps') || "0");
        let data = JSON.parse(localStorage.getItem('alicia_data') || '{"stars":[], "periods":[], "notes":{}, "booksCount":0, "bookList":[]}');
        let photos = JSON.parse(localStorage.getItem('alicia_photos') || '[]');

        window.onload = () => {
            updateTime(); setInterval(updateTime, 1000);
            updateBookDisplay(); renderCalendar(); updateGymDisplay(); setDailyQuote();
            setupReset('book-card', () => { if(confirm("Réinitialiser les lectures ?")) { data.booksCount=0; data.bookList=[]; saveData(); updateBookDisplay(); } });
            setupReset('steps-val', () => { if(confirm("Réinitialiser les pas ?")) { stepCount=0; updateGymDisplay(); } });
        };

        function setDailyQuote() {
            const day = new Date().getDate();
            document.getElementById('daily-quote').innerText = `"${quotes[day % quotes.length]}"`;
        }

        function handleDayClick(i) {
            if(calMode === 'note') {
                openNoteEditor(i);
            } else if(calMode === 'star') {
                if(data.stars.includes(i)) data.stars = data.stars.filter(x => x !== i);
                else data.stars.push(i);
                saveData(); renderCalendar();
            } else {
                if(data.periods.includes(i)) data.periods = data.periods.filter(x => x !== i);
                else data.periods.push(i);
                saveData(); renderCalendar();
            }
        }

        function openNoteEditor(day) {
            const currentNote = data.notes[day] || "";
            document.getElementById('modal-inner').innerHTML = `
                <span class="label">Journal du ${day}</span>
                <textarea id="note-text" rows="6" placeholder="Raconte ta journée ou ton humeur...">${currentNote}</textarea>
                <button onclick="saveNote(${day})" class="btn-main">Enregistrer</button>
                <p onclick="closeModal()" style="text-align:center; margin-top:15px; font-size:10px; opacity:0.5">FERMER</p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function saveNote(day) {
            const val = document.getElementById('note-text').value;
            if(val) data.notes[day] = val; else delete data.notes[day];
            saveData(); renderCalendar(); closeModal();
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar'); cal.innerHTML = '';
            for(let i=1; i<=31; i++) {
                let d = document.createElement('div'); d.className = 'day';
                if(data.stars.includes(i)) d.classList.add('starred');
                if(data.periods.includes(i)) d.classList.add('period');
                if(data.notes[i]) d.classList.add('has-note');
                d.innerText = i; d.onclick = () => handleDayClick(i);
                cal.appendChild(d);
            }
        }

        function unlock() {
            if(document.getElementById('pass').value === '19/10') {
                vibrate([50, 30, 50]);
                document.getElementById('lock').style.display = 'none';
                document.getElementById('vault-content').style.display = 'block';
                renderPhotos();
            } else {
                vibrate(200); document.getElementById('lock').style.animation = "shake 0.4s";
                setTimeout(() => document.getElementById('lock').style.animation = "", 400);
            }
        }

        function renderPhotos() {
            document.getElementById('gallery-grid').innerHTML = photos.map((p, i) => `
                <div style="background:#111; border-radius:15px; overflow:hidden;" onclick="if(confirm('Supprimer cette photo ?')){photos.splice(${i},1); localStorage.setItem('alicia_photos', JSON.stringify(photos)); renderPhotos();}">
                    <img src="${p.src}" style="width:100%; aspect-ratio:1; object-fit:cover;">
                    <p style="font-size:10px; padding:5px; text-align:center; opacity:0.6;">${p.cap}</p>
                </div>
            `).join('');
        }

        function addPhoto(e) {
            const file = e.target.files[0]; if(!file) return;
            const cap = prompt("Légende de la photo ?") || "";
            const reader = new FileReader();
            reader.onload = (ev) => { photos.push({src: ev.target.result, cap: cap}); localStorage.setItem('alicia_photos', JSON.stringify(photos)); renderPhotos(); };
            reader.readAsDataURL(file);
        }

        function updateTime() {
            const now = new Date();
            const diff = now - new Date(2025, 9, 18);
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours-total').innerText = Math.floor(diff / 3600000) + " HEURES";
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }

        function openBookManager() {
            let list = data.bookList.map((b, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${b}</span><span onclick="data.bookList.splice(${i},1); openBookManager(); saveData();">✕</span></div>`).join('');
            document.getElementById('modal-inner').innerHTML = `
                <span class="label">Bibliothèque</span>
                <input type="number" id="nb-b" value="${data.booksCount}">
                <div style="max-height:100px; overflow-y:auto; font-size:12px;">${list}</div>
                <input type="text" id="new-b" placeholder="Titre du livre...">
                <button onclick="if(document.getElementById('new-b').value) data.bookList.push(document.getElementById('new-b').value); data.booksCount=document.getElementById('nb-b').value; saveData(); updateBookDisplay(); openBookManager();" class="btn-main">Enregistrer</button>
                <p onclick="closeModal()" style="text-align:center; margin-top:10px; font-size:10px; opacity:0.5">FERMER</p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function setupReset(id, cb) {
            let t; const el = document.getElementById(id);
            el.addEventListener('touchstart', () => t = setTimeout(cb, 2000));
            el.addEventListener('touchend', () => clearTimeout(t));
        }
        function go(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function updateBookDisplay() { document.getElementById('book-count-text').innerText = data.booksCount + " LIVRES"; }
        function saveData() { localStorage.setItem('alicia_data', JSON.stringify(data)); }
        function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
        function setCalMode(m) { calMode = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+m).classList.add('active'); }
        function initGym() { document.getElementById('gym-btn').innerText = "TRACKING... ✅"; window.addEventListener('devicemotion', (e) => { if (Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2) > 15) { stepCount++; updateGymDisplay(); } }); }
        function updateGymDisplay() { document.getElementById('steps-val').innerText = stepCount; document.getElementById('km').innerText = (stepCount * 0.0007).toFixed(2); document.getElementById('kcal').innerText = Math.floor(stepCount * 0.04); localStorage.setItem('alicia_steps', stepCount); }
    </script>
</body>
</html>
