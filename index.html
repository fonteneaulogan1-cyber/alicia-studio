<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALICIA • MILLION EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Playfair+Display:italic,wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff75c3; --glass: rgba(255, 255, 255, 0.04); --red: #ff0040; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s; }
        
        /* EFFET FLASH ROUGE (EASTER EGG) */
        body.obsession { background: radial-gradient(circle, #400010 0%, #000 100%); }

        .main { flex: 1; padding: 25px; overflow-y: auto; padding-bottom: 120px; }
        .section { display: none; animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        header h1 { font-family: 'Playfair Display', serif; font-size: 50px; font-style: italic; line-height: 0.9; background: linear-gradient(180deg, #fff 30%, #666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: 0.3s; }
        .status-line { color: var(--p); font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        /* CARDS */
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 35px; margin-bottom: 20px; backdrop-filter: blur(40px); }
        .label { font-size: 9px; font-weight: 800; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .big-val { font-size: 80px; font-weight: 200; letter-spacing: -4px; line-height: 1; color: var(--p); }

        /* GYM */
        .gym-grid { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .stat-item span { display: block; font-size: 18px; font-weight: 800; }

        /* CALENDRIER */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { aspect-ratio: 1; background: rgba(255,255,255,0.02); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .day.starred::after { content: '⭐'; font-size: 7px; position: absolute; bottom: 2px; }
        .day.period { background: rgba(255, 117, 195, 0.25); border-color: var(--p); }

        /* VAULT GLITCH */
        .glitch { animation: shake 0.2s linear infinite; border-color: var(--red) !important; }
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(5px); } 50% { transform: translate(-5px); } 100% { transform: translate(0); } }

        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .memory-img { width: 100%; height: 150px; border-radius: 15px; object-fit: cover; }

        .nav { position: fixed; bottom: 30px; left: 5%; width: 90%; height: 85px; background: rgba(10, 10, 10, 0.85); border-radius: 45px; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.08); }
        .nav-item { font-size: 26px; opacity: 0.2; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="main">
        <header>
            <h1 id="main-title" onclick="triggerObsession()">Alicia.</h1>
            <p class="status-line" id="status-text">Possession: Active.</p>
        </header>

        <div id="home" class="section active">
            <div class="card">
                <span class="label">Shared Eternity</span>
                <div style="display: flex; align-items: baseline;">
                    <span class="big-val" id="days">0</span>
                    <span style="font-size: 14px; opacity: 0.2; font-weight: 800; margin-left: 10px;">JOURS</span>
                </div>
            </div>
            <div class="card" onmousedown="startLongPress()" onmouseup="endLongPress()" ontouchstart="startLongPress()" ontouchend="endLongPress()">
                <span class="label">Daily Oracle (Long press for secret)</span>
                <p id="daily-oracle" style="font-family: 'Playfair Display'; font-style: italic; font-size: 22px; line-height: 1.4;">"Chargement..."</p>
            </div>
        </div>

        <div id="gym" class="section">
            <div class="card">
                <span class="label">Gym Tracker</span>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="big-val" id="steps">0</span>
                    <span style="font-size: 40px; cursor: pointer;" onclick="cheatSteps()">🦾</span>
                </div>
                <div class="gym-grid">
                    <div class="stat-item"><span id="km">0.00</span><small>KM</small></div>
                    <div class="stat-item"><span id="kcal">0</span><small>KCAL</small></div>
                </div>
                <button onclick="initGym()" id="gym-btn" style="width:100%; background:none; border:1px solid var(--p); color:var(--p); padding:10px; border-radius:15px; margin-top:20px; font-size:9px; font-weight:800;">ACTIVER CAPTEURS</button>
            </div>
        </div>

        <div id="cycle" class="section">
            <div class="card">
                <span class="label">Journal</span>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button class="btn-mode active" id="mode-star" onclick="setMode('star')" style="flex:1; padding:10px; border-radius:10px; background:none; border:1px solid var(--p); color:#fff; font-size:9px;">⭐ SEX</button>
                    <button class="btn-mode" id="mode-period" onclick="setMode('period')" style="flex:1; padding:10px; border-radius:10px; background:none; border:1px solid rgba(255,255,255,0.1); color:#fff; font-size:9px;">🩸 CYCLE</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
        </div>

        <div id="vault" class="section">
            <div id="lock" class="card" style="text-align: center;">
                <span class="label">Private Vault</span>
                <input type="password" id="pass" placeholder="CODE 18/10" style="background:none; border:1px solid var(--p); color:#fff; padding:15px; border-radius:15px; width:100%; text-align:center; font-size:20px; margin:20px 0; outline:none;">
                <button onclick="unlock()" style="background:var(--p); border:none; padding:15px; border-radius:15px; width:100%; font-weight:800;">ENTRER</button>
            </div>
            <div id="vault-content" style="display:none;">
                <div class="card">
                    <span class="label">Souvenirs</span>
                    <div id="gallery-grid"></div>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="addMemory(event)">
                    <button onclick="document.getElementById('file-input').click()" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--p); background:none; color:var(--p); font-weight:800; margin-top:20px;">+ AJOUTER</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="go('home', this)">🏠</div>
        <div class="nav-item" onclick="go('gym', this)">🦾</div>
        <div class="nav-item" onclick="go('cycle', this)">📖</div>
        <div class="nav-item" onclick="go('vault', this)">🔒</div>
    </nav>

    <script>
        let currentMode = 'star';
        let stepCount = 0;
        let titleClicks = 0;
        let pressTimer;

        // --- EASTER EGG 1: MODE OBSESSION ---
        function triggerObsession() {
            titleClicks++;
            if(titleClicks === 3) {
                document.body.classList.toggle('obsession');
                document.getElementById('status-text').innerText = "PROPRIÉTÉ PRIVÉE. NE PAS TOUCHER.";
                setTimeout(() => { titleClicks = 0; }, 2000);
            }
        }

        // --- EASTER EGG 2: SECRET ORACLE ---
        function startLongPress() { pressTimer = setTimeout(() => { document.getElementById('daily-oracle').innerText = "\"Tu es ma plus belle addiction, Alicia.\""; }, 2000); }
        function endLongPress() { clearTimeout(pressTimer); }

        // --- EASTER EGG 3: CHEAT GYM ---
        let cheatCount = 0;
        function cheatSteps() {
            cheatCount++;
            if(cheatCount >= 5) {
                stepCount += 2000;
                updateGym();
                alert("Mode Triche : +1000 pas ajoutés 😈");
                cheatCount = 0;
            }
        }

        // --- LOGIQUE DE BASE ---
        const phrases = ["Il brûlerait le monde pour son sourire.", "Elle est sa seule prière.", "Son chaos est son équilibre.", "Possédée par son amour."];
        window.onload = () => {
            const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            document.getElementById('daily-oracle').innerText = `"${phrases[day % phrases.length]}"`;
            (JSON.parse(localStorage.getItem('alicia_memories') || "[]")).forEach(src => displayImg(src));
        };

        function go(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function unlock() {
            const card = document.getElementById('lock');
            if(document.getElementById('pass').value === '18/10') {
                card.style.display = 'none';
                document.getElementById('vault-content').style.display = 'block';
            } else {
                card.classList.add('glitch');
                setTimeout(() => card.classList.remove('glitch'), 500);
            }
        }

        function addMemory(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                displayImg(e.target.result);
                let m = JSON.parse(localStorage.getItem('alicia_memories') || "[]");
                m.push(e.target.result); localStorage.setItem('alicia_memories', JSON.stringify(m));
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function displayImg(src) {
            const img = document.createElement('img'); img.src = src; img.className = 'memory-img';
            document.getElementById('gallery-grid').appendChild(img);
        }

        function initGym() { if (typeof DeviceMotionEvent.requestPermission === 'function') DeviceMotionEvent.requestPermission().then(r => { if(r=='granted') startGym(); }); else startGym(); }
        function startGym() {
            window.addEventListener('devicemotion', (e) => {
                if(Math.abs(e.accelerationIncludingGravity.x) > 15) { stepCount++; updateGym(); }
            });
            document.getElementById('gym-btn').innerText = "TRACKING LIVE ✅";
        }
        function updateGym() {
            let r = Math.floor(stepCount/2);
            document.getElementById('steps').innerText = r;
            document.getElementById('km').innerText = (r*0.0007).toFixed(2);
            document.getElementById('kcal').innerText = Math.floor(r*0.04);
        }

        function setMode(m) { 
            currentMode = m; 
            document.querySelectorAll('.btn-mode').forEach(b => b.style.borderColor = 'rgba(255,255,255,0.1)');
            document.getElementById('mode-'+m).style.borderColor = 'var(--p)';
        }
        const cal = document.getElementById('calendar');
        for(let i=1; i<=31; i++) {
            let d = document.createElement('div'); d.className = 'day'; d.innerText = i;
            d.onclick = () => { if(currentMode === 'star') d.classList.toggle('starred'); else d.classList.toggle('period'); };
            cal.appendChild(d);
        }

        setInterval(() => { document.getElementById('days').innerText = Math.floor((new Date() - new Date(2025, 9, 18)) / 86400000); }, 1000);
    </script>
</body>
</html>
